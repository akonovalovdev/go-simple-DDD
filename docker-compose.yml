services:
  app:
    build: <template>
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@localhost:5432/<base-template>?sslmode=disable
      - SERVER_PORT=8080
      - LOG_LEVEL=info
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["./goose"]
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=postgres port=5432 user=postgres password=postgres dbname=auth_db sslmode=disable"
    volumes:
      - ./migrations:/migrations
    command: ["-dir", "/migrations", "up"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
